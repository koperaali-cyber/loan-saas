<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: lenderSidebar('profile')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('My Profile', ${lender != null ? lender.businessName : ''})}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2>My profile</h2>
                    <p>Your business and account details.</p>
                </div>
                <div class="actions">
                    <a th:href="@{/lender/change-password}" class="btn btn-ghost">Change password</a>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="profile-hero">
                        <div class="big-avatar"
                             th:text="${lender != null ? #strings.substring(lender.businessName,0,1) : #strings.substring(currentUser.fullName,0,1)}">B</div>
                        <div style="flex:1;">
                            <div class="h-name" th:text="${lender != null ? lender.businessName : currentUser.fullName}">Business</div>
                            <div class="h-sub" th:text="'Owner: ' + ${currentUser.fullName}">Owner</div>
                            <div style="margin-top:8px;" th:if="${lender != null}">
                                <span th:replace="~{fragments/layout :: statusBadge(${lender.approvalStatus})}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-head"><h3>Account information</h3></div>
                <div class="card-body">
                    <div class="info-list">
                        <div class="info-row"><span class="k">Business name</span><span class="v" th:text="${lender != null ? lender.businessName : '—'}">—</span></div>
                        <div class="info-row"><span class="k">Owner name</span><span class="v" th:text="${currentUser.fullName}">—</span></div>
                        <div class="info-row"><span class="k">Phone number</span><span class="v" th:text="${currentUser.phone}">—</span></div>
                        <div class="info-row"><span class="k">Email</span><span class="v" th:text="${currentUser.email != null ? currentUser.email : '—'}">—</span></div>
                        <div class="info-row"><span class="k">Account role</span><span class="v">Lender</span></div>
                        <div class="info-row"><span class="k">Member since</span><span class="v" th:text="${#temporals.format(currentUser.createdAt, 'dd MMM yyyy')}">—</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
