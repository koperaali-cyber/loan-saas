<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Customer')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: lenderSidebar('customers')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Customer', ${lender != null ? lender.businessName : ''})}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2 th:text="${editing} ? 'Edit customer' : 'Register new customer'">Customer</h2>
                    <p>NIDA and phone number must be unique across the whole platform.</p>
                </div>
                <div class="actions">
                    <a th:href="@{/lender/customers}" class="btn btn-ghost">Back</a>
                </div>
            </div>

            <div class="card" style="max-width:760px;">
                <div class="card-body">
                    <form th:action="${editing} ? @{'/lender/customers/' + ${customer.id}} : @{/lender/customers}"
                          th:object="${customer}" method="post" enctype="multipart/form-data">

                        <div class="photo-input" style="margin-bottom:22px;">
                            <div class="photo-preview" id="photoPlaceholder">
                                <img th:if="${customer.existingPhoto != null}" th:src="@{'/uploads/' + ${customer.existingPhoto}}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">
                                <svg th:unless="${customer.existingPhoto != null}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            </div>
                            <div class="field" style="flex:1;">
                                <label>Customer photo <span class="hint">(optional)</span></label>
                                <input type="file" th:field="*{photoFile}" accept="image/*"
                                       data-photo-input data-photo-target="photoPlaceholder">
                            </div>
                        </div>

                        <input type="hidden" th:field="*{existingPhoto}">

                        <div class="form-grid">
                            <div class="field full">
                                <label>Full name <span class="req">*</span></label>
                                <input type="text" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? 'invalid'" placeholder="e.g. Juma Mussa">
                                <span class="err" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                            </div>
                            <div class="field">
                                <label>Phone number <span class="req">*</span></label>
                                <input type="text" th:field="*{phone}" th:classappend="${#fields.hasErrors('phone')} ? 'invalid'" placeholder="+255712345678">
                                <span class="hint">Format: +255XXXXXXXXX</span>
                                <span class="err" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
                            </div>
                            <div class="field">
                                <label>Alternative phone <span class="hint">(optional)</span></label>
                                <input type="text" th:field="*{alternativePhone}" th:classappend="${#fields.hasErrors('alternativePhone')} ? 'invalid'" placeholder="+255754112233">
                                <span class="err" th:if="${#fields.hasErrors('alternativePhone')}" th:errors="*{alternativePhone}"></span>
                            </div>
                            <div class="field full">
                                <label>NIDA number</label>
                                <input type="text" th:field="*{nida}" th:classappend="${#fields.hasErrors('nida')} ? 'invalid'" placeholder="20-digit National ID number">
                                <span class="hint">Must be unique across the platform.</span>
                                <span class="err" th:if="${#fields.hasErrors('nida')}" th:errors="*{nida}"></span>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" th:text="${editing} ? 'Save changes' : 'Register customer'">Save</button>
                            <a th:href="@{/lender/customers}" class="btn btn-ghost">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
