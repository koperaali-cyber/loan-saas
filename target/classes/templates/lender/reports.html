<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Reports')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: lenderSidebar('reports')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Reports', ${lender != null ? lender.businessName : ''})}"></div>

        <div class="content">
            <div class="page-head">
                <div class="titles">
                    <h2>Reports</h2>
                    <p>Summary of your lending performance. Export your full loan book below.</p>
                </div>
                <div class="actions">
                    <a th:href="@{/lender/loans/export/pdf}" class="btn btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export PDF
                    </a>
                    <a th:href="@{/lender/loans/export/excel}" class="btn btn-money">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export Excel
                    </a>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                    <div class="val money-num tzs" th:text="${#numbers.formatDecimal(totalIssued, 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="lbl">Total issued</div>
                </div>
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <div class="val money-num tzs" th:text="${#numbers.formatDecimal(totalCollected, 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="lbl">Total collected</div>
                </div>
                <div class="stat">
                    <div class="ic ic-brand"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
                    <div class="val" th:text="${activeLoans}">0</div>
                    <div class="lbl">Active loans</div>
                </div>
                <div class="stat">
                    <div class="ic ic-warn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg></div>
                    <div class="val" th:text="${overdueLoans}">0</div>
                    <div class="lbl">Overdue loans</div>
                </div>
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                    <div class="val" th:text="${paidLoans}">0</div>
                    <div class="lbl">Fully paid loans</div>
                </div>
            </div>

            <div class="card">
                <div class="card-head"><h3>Loan book</h3><span class="sub" th:text="${#lists.size(loans)} + ' loan(s)'">0</span></div>
                <div class="card-body flush">
                    <div class="table-wrap">
                        <table class="data">
                            <thead>
                            <tr><th>Customer</th><th>Amount</th><th>Repayment</th><th>Paid</th><th>Balance</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="ln : ${loans}">
                                <td th:text="${ln.customer.fullName}">Customer</td>
                                <td class="num money-num" th:text="${#numbers.formatDecimal(ln.amount, 0, 'COMMA', 0, 'POINT')}">0</td>
                                <td class="num money-num" th:text="${#numbers.formatDecimal(ln.totalRepayment, 0, 'COMMA', 0, 'POINT')}">0</td>
                                <td class="num money-num" th:text="${#numbers.formatDecimal(ln.amountPaid, 0, 'COMMA', 0, 'POINT')}">0</td>
                                <td class="num money-num" th:text="${#numbers.formatDecimal(ln.remainingBalance, 0, 'COMMA', 0, 'POINT')}">0</td>
                                <td><span th:replace="~{fragments/layout :: statusBadge(${ln.status})}"></span></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(loans)}">
                                <td colspan="6" class="t-empty"><div>No loans to report yet.</div></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
