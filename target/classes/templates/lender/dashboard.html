<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: lenderSidebar('dashboard')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Dashboard', ${lender != null ? lender.businessName : ''})}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2 th:text="'Karibu, ' + ${currentUser.fullName} + '!'">Welcome!</h2>
                    <p>Here's how your lending business is doing today.</p>
                </div>
                <div class="actions">
                    <a th:href="@{/lender/customers/new}" class="btn btn-ghost">Add customer</a>
                    <a th:href="@{/lender/loans/new}" class="btn btn-primary">New loan</a>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat">
                    <div class="ic ic-brand"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg></div>
                    <div class="val" th:text="${totalCustomers}">0</div>
                    <div class="lbl">Total customers</div>
                </div>
                <div class="stat">
                    <div class="ic ic-info"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
                    <div class="val" th:text="${activeLoans}">0</div>
                    <div class="lbl">Active loans</div>
                </div>
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                    <div class="val" th:text="${completedLoans}">0</div>
                    <div class="lbl">Completed loans</div>
                </div>
                <div class="stat">
                    <div class="ic ic-warn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="val" th:text="${overdueLoans}">0</div>
                    <div class="lbl">Overdue / defaulted</div>
                </div>
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                    <div class="val money-num tzs" th:text="${#numbers.formatDecimal(totalIssued, 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="lbl">Money issued</div>
                </div>
                <div class="stat">
                    <div class="ic ic-money"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                    <div class="val money-num tzs" th:text="${#numbers.formatDecimal(totalCollected, 0, 'COMMA', 0, 'POINT')}">0</div>
                    <div class="lbl">Money collected</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <div class="card-head"><h3>Loan status distribution</h3></div>
                    <div class="card-body">
                        <div id="loanChart"
                             th:attr="data-active=${chartActive},data-partial=${chartPartial},data-paid=${chartPaid},data-overdue=${chartOverdue},data-defaulted=${chartDefaulted}"
                             style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;justify-content:center;">
                            <svg id="donut" width="180" height="180" viewBox="0 0 42 42"></svg>
                            <div id="legend" style="display:grid;gap:10px;"></div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-head"><h3>Recent activity</h3></div>
                    <div class="card-body">
                        <div class="info-list" th:if="${!#lists.isEmpty(recentActivities)}">
                            <div class="info-row" th:each="a : ${recentActivities}">
                                <span class="k" th:text="${a.action}">Action</span>
                                <span class="v" style="font-weight:500;color:var(--muted);" th:text="${#temporals.format(a.createdAt, 'dd MMM, HH:mm')}">time</span>
                            </div>
                        </div>
                        <div class="t-empty" th:if="${#lists.isEmpty(recentActivities)}">
                            <div>No activity yet. Start by adding a customer.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
(function () {
    var el = document.getElementById('loanChart');
    if (!el) return;
    var data = [
        { label: 'Active',    value: +el.dataset.active    || 0, color: '#4f46e5' },
        { label: 'Partial',   value: +el.dataset.partial   || 0, color: '#0ea5e9' },
        { label: 'Paid',      value: +el.dataset.paid      || 0, color: '#059669' },
        { label: 'Overdue',   value: +el.dataset.overdue   || 0, color: '#d97706' },
        { label: 'Defaulted', value: +el.dataset.defaulted || 0, color: '#dc2626' }
    ];
    var total = data.reduce(function (s, d) { return s + d.value; }, 0);
    var svg = document.getElementById('donut');
    var legend = document.getElementById('legend');
    var C = 2 * Math.PI * 15.915;
    var offset = 25;

    if (total === 0) {
        svg.innerHTML = '<circle cx="21" cy="21" r="15.915" fill="none" stroke="#e2e8f0" stroke-width="6"/>' +
            '<text x="21" y="22" text-anchor="middle" font-size="4" fill="#64748b">No loans</text>';
    } else {
        var html = '<circle cx="21" cy="21" r="15.915" fill="none" stroke="#f1f5f9" stroke-width="6"/>';
        data.forEach(function (d) {
            if (d.value === 0) return;
            var pct = d.value / total * 100;
            html += '<circle cx="21" cy="21" r="15.915" fill="none" stroke="' + d.color +
                '" stroke-width="6" stroke-dasharray="' + pct + ' ' + (100 - pct) +
                '" stroke-dashoffset="' + offset + '"/>';
            offset -= pct;
        });
        html += '<text x="21" y="20" text-anchor="middle" font-size="6" font-weight="800" fill="#0f172a">' + total + '</text>';
        html += '<text x="21" y="26" text-anchor="middle" font-size="3" fill="#64748b">loans</text>';
        svg.innerHTML = html;
    }

    legend.innerHTML = data.map(function (d) {
        return '<div style="display:flex;align-items:center;gap:9px;font-size:13.5px;">' +
            '<span style="width:11px;height:11px;border-radius:3px;background:' + d.color + ';display:inline-block;"></span>' +
            '<span style="color:#334155;">' + d.label + '</span>' +
            '<strong style="margin-left:auto;">' + d.value + '</strong></div>';
    }).join('');
})();
</script>
</body>
</html>
