<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('All Lenders')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: adminSidebar('lenders')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Lenders', 'Super Admin Console')}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2>All lenders</h2>
                    <p>Every registered lending business on the platform.</p>
                </div>
                <div class="actions">
                    <div class="search-box">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search lenders..." data-table-filter="lendersTable">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body flush">
                    <div class="table-wrap">
                        <table class="data" id="lendersTable">
                            <thead>
                            <tr><th data-sort>Business</th><th data-sort>Owner</th><th data-sort>Phone</th><th data-sort>Status</th><th></th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="l : ${lenders}">
                                <td>
                                    <div class="cell-user">
                                        <div class="avatar" th:text="${#strings.substring(l.businessName,0,1)}">B</div>
                                        <div><div class="nm" th:text="${l.businessName}">Business</div></div>
                                    </div>
                                </td>
                                <td th:text="${l.user.fullName}">Owner</td>
                                <td th:text="${l.user.phone}">+255</td>
                                <td><span th:replace="~{fragments/layout :: statusBadge(${l.approvalStatus})}"></span></td>
                                <td><a th:href="@{'/admin/lenders/' + ${l.id}}" class="btn btn-ghost btn-sm">Manage</a></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(lenders)}">
                                <td colspan="5" class="t-empty">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
                                    <div>No lenders registered yet.</div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
