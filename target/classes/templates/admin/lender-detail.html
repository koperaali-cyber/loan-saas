<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Lender Details')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: adminSidebar('lenders')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Lender Details', 'Super Admin Console')}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2 th:text="${lender.businessName}">Business</h2>
                    <p>Manage this lender's account and access.</p>
                </div>
                <div class="actions">
                    <a th:href="@{/admin/lenders}" class="btn btn-ghost">Back to lenders</a>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="profile-hero">
                        <div class="big-avatar" th:text="${#strings.substring(lender.businessName,0,1)}">B</div>
                        <div style="flex:1;">
                            <div class="h-name" th:text="${lender.businessName}">Business</div>
                            <div class="h-sub" th:text="'Owner: ' + ${lender.user.fullName}">Owner</div>
                            <div style="margin-top:8px;"><span th:replace="~{fragments/layout :: statusBadge(${lender.approvalStatus})}"></span></div>
                        </div>
                    </div>

                    <div class="mini-stats">
                        <div class="mini-stat"><div class="v" th:text="${customerCount}">0</div><div class="l">Customers</div></div>
                        <div class="mini-stat"><div class="v" th:text="${loanCount}">0</div><div class="l">Loans</div></div>
                        <div class="mini-stat"><div class="v money-num" th:text="${#numbers.formatDecimal(totalIssued, 0, 'COMMA', 0, 'POINT')}">0</div><div class="l">Issued (TZS)</div></div>
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <div class="card-head"><h3>Account information</h3></div>
                    <div class="card-body">
                        <div class="info-list">
                            <div class="info-row"><span class="k">Owner name</span><span class="v" th:text="${lender.user.fullName}">—</span></div>
                            <div class="info-row"><span class="k">Phone</span><span class="v" th:text="${lender.user.phone}">—</span></div>
                            <div class="info-row"><span class="k">Email</span><span class="v" th:text="${lender.user.email != null ? lender.user.email : '—'}">—</span></div>
                            <div class="info-row"><span class="k">Money collected</span><span class="v money-num tzs" th:text="${#numbers.formatDecimal(totalCollected, 0, 'COMMA', 0, 'POINT')}">0</span></div>
                            <div class="info-row" th:if="${lender.rejectionReason != null}"><span class="k">Rejection reason</span><span class="v" style="color:var(--danger);" th:text="${lender.rejectionReason}">—</span></div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-head"><h3>Manage access</h3></div>
                    <div class="card-body">
                        <!-- Approve (pending) -->
                        <form th:if="${lender.approvalStatus.name() == 'PENDING_APPROVAL'}"
                              th:action="@{'/admin/lenders/' + ${lender.id} + '/approve'}" method="post" style="margin-bottom:12px;">
                            <button type="submit" class="btn btn-money btn-block">Approve lender</button>
                        </form>

                        <!-- Reject (pending) -->
                        <form th:if="${lender.approvalStatus.name() == 'PENDING_APPROVAL'}"
                              th:action="@{'/admin/lenders/' + ${lender.id} + '/reject'}" method="post" style="margin-bottom:12px;">
                            <div class="field" style="margin-bottom:10px;">
                                <label>Rejection reason</label>
                                <input type="text" name="reason" placeholder="Reason for rejection" required>
                            </div>
                            <button type="submit" class="btn btn-danger btn-block">Reject lender</button>
                        </form>

                        <!-- Suspend (approved) -->
                        <form th:if="${lender.approvalStatus.name() == 'APPROVED'}"
                              th:action="@{'/admin/lenders/' + ${lender.id} + '/suspend'}" method="post" style="margin-bottom:12px;">
                            <button type="submit" class="btn btn-warn btn-block">Suspend lender</button>
                        </form>

                        <!-- Activate (suspended/rejected) -->
                        <form th:if="${lender.approvalStatus.name() == 'SUSPENDED' or lender.approvalStatus.name() == 'REJECTED'}"
                              th:action="@{'/admin/lenders/' + ${lender.id} + '/activate'}" method="post" style="margin-bottom:12px;">
                            <button type="submit" class="btn btn-money btn-block">Activate lender</button>
                        </form>

                        <div class="divider"></div>

                        <!-- Reset password -->
                        <form th:action="@{'/admin/lenders/' + ${lender.id} + '/reset-password'}" method="post" style="margin-bottom:12px;">
                            <div class="field" style="margin-bottom:10px;">
                                <label>Reset password</label>
                                <input type="text" name="newPassword" placeholder="New password (min 6 chars)" minlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-ghost btn-block">Reset password</button>
                        </form>

                        <!-- Delete -->
                        <form th:action="@{'/admin/lenders/' + ${lender.id} + '/delete'}" method="post"
                              data-confirm="Delete this lender and ALL their data? This cannot be undone.">
                            <button type="submit" class="btn btn-danger btn-block">Delete account</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
