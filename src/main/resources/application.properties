# =====================================================================
# LoanSaaS Multi-Tenant Loan Management Platform - Render Config
# =====================================================================

spring.application.name=LoanSaaS

# ---- Server ----
# Render inabadilisha port dynamically, hii itasoma port ya Render au itatumia 8080 kama default
server.port=${PORT:8080}

# ---- PostgreSQL Database ----
# Inasoma kutoka kwenye Environment Variables ambazo tutaziweka Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "update" ni salama ili isifute data zako kila application ikijirun upya
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---- Thymeleaf ----
# Weka true kwenye production ili kuongeza speed (performance)
spring.thymeleaf.cache=true

# ---- File upload limits (profile photos) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- File storage directory ----
# NOTE: Kwenye Render, ukitaka faili zisifutike application ikirestart,
# itabidi utumie Render Disks (Render Persistent Volume) hapo baadaye.
app.upload.dir=/data/uploads

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.com.loansaas=INFO