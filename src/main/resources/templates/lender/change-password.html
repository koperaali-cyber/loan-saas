<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Change Password')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: lenderSidebar('change-password')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Change Password', ${lender != null ? lender.businessName : ''})}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2>Change password</h2>
                    <p>Keep your account secure with a strong password.</p>
                </div>
            </div>

            <div class="card" style="max-width:520px;">
                <div class="card-body">
                    <form th:action="@{/lender/change-password}" th:object="${changePassword}" method="post">
                        <div class="field full" style="margin-bottom:16px;">
                            <label>Current password <span class="req">*</span></label>
                            <input type="password" th:field="*{currentPassword}" th:classappend="${#fields.hasErrors('currentPassword')} ? 'invalid'">
                            <span class="err" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
                        </div>
                        <div class="field full" style="margin-bottom:16px;">
                            <label>New password <span class="req">*</span></label>
                            <input type="password" th:field="*{newPassword}" th:classappend="${#fields.hasErrors('newPassword')} ? 'invalid'">
                            <span class="hint">At least 6 characters.</span>
                            <span class="err" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
                        </div>
                        <div class="field full">
                            <label>Confirm new password <span class="req">*</span></label>
                            <input type="password" th:field="*{confirmPassword}" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'invalid'">
                            <span class="err" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Update password</button>
                            <a th:href="@{/lender/profile}" class="btn btn-ghost">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
