<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ============ ADMIN SIDEBAR ============ -->
<aside th:fragment="adminSidebar(active)" class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="logo">L</div>
        <div>
            <div class="name">LoanSaaS</div>
            <div class="sub">Admin Console</div>
        </div>
    </div>
    <nav class="sidebar-scroll">
        <div class="nav-label">Overview</div>
        <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${active == 'dashboard'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            <span>Dashboard</span>
        </a>

        <div class="nav-label">Tenants</div>
        <a th:href="@{/admin/lenders}" class="nav-item" th:classappend="${active == 'lenders'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><line x1="9" y1="9" x2="9" y2="9"/><line x1="9" y1="13" x2="9" y2="13"/></svg>
            <span>All Lenders</span>
        </a>
        <a th:href="@{/admin/lenders/pending}" class="nav-item" th:classappend="${active == 'pending'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Pending Approvals</span>
        </a>

        <div class="nav-label">Platform Data</div>
        <a th:href="@{/admin/customers}" class="nav-item" th:classappend="${active == 'customers'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Customers</span>
        </a>
        <a th:href="@{/admin/loans}" class="nav-item" th:classappend="${active == 'loans'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span>Loans</span>
        </a>
        <a th:href="@{/admin/payments}" class="nav-item" th:classappend="${active == 'payments'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span>Payments</span>
        </a>
        <a th:href="@{/admin/activities}" class="nav-item" th:classappend="${active == 'activities'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span>Activity Log</span>
        </a>
    </nav>
    <div class="sidebar-foot">
        <div class="sidebar-user">
            <div class="avatar" th:text="${currentUser != null ? #strings.substring(currentUser.fullName,0,1) : 'A'}">A</div>
            <div class="meta">
                <div class="u-name" th:text="${currentUser != null ? currentUser.fullName : 'Super Admin'}">Super Admin</div>
                <div class="u-role">System Owner</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" style="margin-top:8px;">
            <button type="submit" class="nav-item" style="width:100%;border:none;background:none;cursor:pointer;text-align:left;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </form>
    </div>
</aside>

<!-- ============ LENDER SIDEBAR ============ -->
<aside th:fragment="lenderSidebar(active)" class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="logo">L</div>
        <div>
            <div class="name">LoanSaaS</div>
            <div class="sub">Lender Portal</div>
        </div>
    </div>
    <nav class="sidebar-scroll">
        <div class="nav-label">Main</div>
        <a th:href="@{/lender/dashboard}" class="nav-item" th:classappend="${active == 'dashboard'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            <span>Dashboard</span>
        </a>

        <div class="nav-label">Lending</div>
        <a th:href="@{/lender/customers}" class="nav-item" th:classappend="${active == 'customers'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Customers</span>
        </a>
        <a th:href="@{/lender/loans}" class="nav-item" th:classappend="${active == 'loans'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span>Loans</span>
        </a>
        <a th:href="@{/lender/payments}" class="nav-item" th:classappend="${active == 'payments'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span>Payments</span>
        </a>
        <a th:href="@{/lender/reports}" class="nav-item" th:classappend="${active == 'reports'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
            <span>Reports</span>
        </a>

        <div class="nav-label">Account</div>
        <a th:href="@{/lender/profile}" class="nav-item" th:classappend="${active == 'profile'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profile</span>
        </a>
        <a th:href="@{/lender/change-password}" class="nav-item" th:classappend="${active == 'change-password'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Change Password</span>
        </a>
    </nav>
    <div class="sidebar-foot">
        <div class="sidebar-user">
            <div class="avatar" th:text="${currentUser != null ? #strings.substring(currentUser.fullName,0,1) : 'L'}">L</div>
            <div class="meta">
                <div class="u-name" th:text="${lender != null ? lender.businessName : (currentUser != null ? currentUser.fullName : 'Lender')}">Lender</div>
                <div class="u-role">Lender Account</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post" style="margin-top:8px;">
            <button type="submit" class="nav-item" style="width:100%;border:none;background:none;cursor:pointer;text-align:left;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </form>
    </div>
</aside>

</body>
</html>
