<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('All Payments')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: adminSidebar('payments')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Payments', 'Super Admin Console')}"></div>

        <div class="content">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-head">
                <div class="titles">
                    <h2>All payments</h2>
                    <p>Every repayment recorded across the platform.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-body flush">
                    <div class="table-wrap">
                        <table class="data">
                            <thead>
                            <tr><th>Date</th><th>Customer</th><th>Lender</th><th>Amount paid</th><th>Balance after</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${payments}">
                                <td th:text="${#temporals.format(p.paymentDate, 'dd MMM yyyy')}">date</td>
                                <td th:text="${p.loan.customer.fullName}">Customer</td>
                                <td th:text="${p.lender.businessName}">Lender</td>
                                <td class="num money-num" th:text="${#numbers.formatDecimal(p.amountPaid, 0, 'COMMA', 0, 'POINT')}">0</td>
                                <td class="num money-num" th:text="${p.balanceAfter != null ? #numbers.formatDecimal(p.balanceAfter, 0, 'COMMA', 0, 'POINT') : '—'}">0</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(payments)}">
                                <td colspan="5" class="t-empty">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                    <div>No payments recorded yet.</div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
