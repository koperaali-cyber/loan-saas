<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Activity Log')}"></head>
<body>

<div class="app">
    <div th:replace="~{fragments/sidebar :: adminSidebar('activities')}"></div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div th:replace="~{fragments/layout :: topbar('Activity Log', 'Super Admin Console')}"></div>

        <div class="content">
            <div class="page-head">
                <div class="titles">
                    <h2>Activity log</h2>
                    <p>Recent actions across the platform.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-body flush">
                    <div class="table-wrap">
                        <table class="data">
                            <thead>
                            <tr><th>When</th><th>User</th><th>Action</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="a : ${activities}">
                                <td th:text="${#temporals.format(a.createdAt, 'dd MMM yyyy, HH:mm')}">time</td>
                                <td th:text="${a.userName != null ? a.userName : 'System'}">User</td>
                                <td th:text="${a.action}">Action</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(activities)}">
                                <td colspan="3" class="t-empty">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                    <div>No activity recorded yet.</div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
